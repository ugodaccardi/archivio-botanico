<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

/* HEADER */
#header {
  background: #137139; color: white; padding: 10px 20px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0; z-index: 1000;
}
#header h1 { font-size: 1.1rem; font-weight: bold; }
#header .stats { font-size: 0.85rem; color: #d4e6cf; }
#header .back-link {
  color: #f5e642; text-decoration: none; font-size: 0.85rem;
  border: 1px solid #f5e642; padding: 4px 10px; border-radius: 4px;
}
#header .back-link:hover { background: #f5e642; color: #137139; }

/* LAYOUT */
#container { display: flex; flex: 1; overflow: hidden; }

/* PANNELLO LATERALE */
#sidebar {
  width: 260px; min-width: 220px; background: #f9f9f9;
  border-right: 1px solid #ddd; display: flex; flex-direction: column;
  overflow: hidden; flex-shrink: 0;
}
#sidebar-header {
  background: #2d5a27; color: white; padding: 10px 14px; font-size: 0.9rem; font-weight: bold;
}
#sidebar-actions {
  padding: 8px 14px; display: flex; gap: 8px; border-bottom: 1px solid #ddd;
}
#sidebar-actions button {
  flex: 1; padding: 5px 0; font-size: 0.78rem; cursor: pointer;
  border: 1px solid #ccc; border-radius: 4px; background: white;
}
#sidebar-actions button:hover { background: #d4e6cf; }
#loc-list {
  overflow-y: auto; flex: 1; padding: 8px 0;
}
.loc-label {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 14px; cursor: pointer; font-size: 0.84rem;
  border-bottom: 1px solid #f0f0f0;
}
.loc-label:hover { background: #f0f7ee; }
.loc-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
.loc-nome { flex: 1; }
.loc-count {
  background: #e0e0e0; color: #555; font-size: 0.75rem;
  padding: 1px 6px; border-radius: 10px;
}
input[type=checkbox] { accent-color: #137139; }
#sidebar-footer {
  padding: 8px 14px; font-size: 0.78rem; color: #888;
  border-top: 1px solid #ddd; text-align: center;
}

/* MAPPA */
#map { flex: 1; }

/* POPUP */
.popup-box { max-width: 280px; font-family: Arial, sans-serif; }
.popup-box img { display: block; }
.popup-sci { font-style: italic; font-weight: bold; font-size: 0.95rem; color: #137139; margin-bottom: 3px; }
.popup-com { font-size: 0.88rem; color: #333; margin-bottom: 6px; }
.popup-meta { font-size: 0.78rem; color: #666; display: flex; flex-direction: column; gap: 2px; margin-bottom: 8px; }
.popup-btns { display: flex; gap: 6px; flex-wrap: wrap; }
.popup-btns a {
  padding: 4px 10px; border-radius: 4px; font-size: 0.78rem;
  text-decoration: none; font-weight: bold;
}
.btn-png  { background: #137139; color: white; }
.btn-pdf  { background: #b8860b; color: white; }
.btn-maps { background: #1565C0; color: white; }
.popup-btns a:hover { opacity: 0.85; }

/* Mobile */
@media (max-width: 600px) {
  #sidebar { width: 200px; min-width: 160px; }
  #header h1 { font-size: 0.95rem; }
}
</style>
</head>

  {"lat":38.188031,"lon":12.733222,"loc":"Grotta dei Cavalli","colore":"#C62828","popup":"<div class=\"popup-box\"><img src=\"https://drive.google.com/file/d/1Heh1Un6Wq4tV6zO3ciOGpCE6G52iIepv/preview\" style=\"width:100%;max-width:260px;border-radius:6px;margin-bottom:8px\"><div class=\"popup-sci\">Tamarix africana</div><div class=\"popup-com\">Tamerice africana, Tamerice, Tamerischio. Conosciuta anche come Tamerice del Senegal nelle regioni meridionali italiane dove è stata introdotta come pianta ornamentale e di consolidamento costiero.</div><div class=\"popup-meta\"><span>📅 14/03/2026</span><span>📍 Grotta dei Cavalli</span><span>🌿 Tamaricaceae, famiglia di arbusti e piccoli alberi xerofile adattati a ambienti salini e aridi. Caratterizzati da foglie squamose ridotte e fiori piccoli riuniti in spighe dense. Distribuite in zone aride e semi-aride di Africa, Asia e bacino del Mediterraneo.</span></div><div class=\"popup-btns\"><a href=\"https://drive.google.com/file/d/1VueoBkfcmnTi40t4StGxVuZW5oyqM2_W/preview\" target=\"_blank\" class=\"btn-png\">📄 PNG</a><a href=\"https://drive.google.com/file/d/1Z6FnGRe5bANwIcS8oCEfW1S5qlSRyZnI/preview\" target=\"_blank\" class=\"btn-pdf\">📑 PDF</a><a href=\"📍 Vedi su Maps\" target=\"_blank\" class=\"btn-maps\">📍 Maps</a></div></div>"},

  {"lat":38.188989,"lon":12.732506,"loc":"Grotta dei Cavalli","colore":"#C62828","popup":"<div class=\"popup-box\"><img src=\"https://drive.google.com/file/d/11oMF-myuUkBVxMv01ua9ZwKs6noLJZUP/preview\" style=\"width:100%;max-width:260px;border-radius:6px;margin-bottom:8px\"><div class=\"popup-sci\">Geranium molle</div><div class=\"popup-com\">Geranio molle, Geranio tenero. In Italia diffuso con il nome vernacolare di Piè di colomba molle o Geranio delle strade. Conosciuto anche come Soft crane's-bill nei paesi anglofoni.</div><div class=\"popup-meta\"><span>📅 14/03/2026</span><span>📍 Grotta dei Cavalli</span><span>🌿 Geraniaceae, famiglia di piante erbacee e suffrutticose con fiori regolari e frutti caratteristici a rostro. Comprende circa 800 specie diffuse principalmente nelle regioni temperate e subtropicali del globo.</span></div><div class=\"popup-btns\"><a href=\"https://drive.google.com/file/d/11-ot0NxHuW_YC8dQbRqjERA8OjKxUme8/preview\" target=\"_blank\" class=\"btn-png\">📄 PNG</a><a href=\"https://drive.google.com/file/d/1dZWRgK2tnZMWWeXIaVqJVFTYtEB121lN/preview\" target=\"_blank\" class=\"btn-pdf\">📑 PDF</a><a href=\"📍 Vedi su Maps\" target=\"_blank\" class=\"btn-maps\">📍 Maps</a></div></div>"},
  {"lat":38.188706,"lon":12.730117,"loc":"Grotta dei Cavalli","colore":"#C62828","popup":"<div class=\"popup-box\"><img src=\"https://drive.google.com/file/d/1i5-OB48P10pPKQFoIRBdTe5dC7wrblfE/preview\" style=\"width:100%;max-width:260px;border-radius:6px;margin-bottom:8px\"><div class=\"popup-sci\">Plantago serraria</div><div class=\"popup-com\">Piantaggine seghettata, Plantago seghettata. Denominazione locale nelle aree mediterranee come piantaggine minore seghettata. Specie poco diffusa nella terminologia popolare italiana, maggiormente nota in ambito botanico scientifico.</div><div class=\"popup-meta\"><span>📅 14/03/2026</span><span>📍 Grotta dei Cavalli</span><span>🌿 Plantaginaceae, famiglia erbacea cosmopolita caratterizzata da fiori minuti in infiorescenze spiciformi dense. Comprende circa 90 generi con particolare concentrazione nel genere Plantago. Famiglia di notevole interesse etnobotanico e medicinale.</span></div><div class=\"popup-btns\"><a href=\"https://drive.google.com/file/d/1j4pM3kYpCNH0iSHdqXMQ9OgJ6WYeYerN/preview\" target=\"_blank\" class=\"btn-png\">📄 PNG</a><a href=\"https://drive.google.com/file/d/1eDgKqLtvyBE62QUF6RONKJBQmK8jJFze/preview\" target=\"_blank\" class=\"btn-pdf\">📑 PDF</a><a href=\"📍 Vedi su Maps\" target=\"_blank\" class=\"btn-maps\">📍 Maps</a></div></div>"},
  {"lat":38.188661,"lon":12.730069,"loc":"Grotta dei Cavalli","colore":"#C62828","popup":"<div class=\"popup-box\"><img src=\"https://drive.google.com/file/d/1gyFSF18K3BhL9hN8ON8wB-HMCf2k5jvc/preview\" style=\"width:100%;max-width:260px;border-radius:6px;margin-bottom:8px\"><div class=\"popup-sci\">Plantago serraria</div><div class=\"popup-com\">Piantaggine seghettata, Piantaggine a foglie seghettate. È una specie poco conosciuta in Italia, diffusa soprattutto in ambiti floro-steppici del Mediterraneo orientale e dell'Asia Minore.</div><div class=\"popup-meta\"><span>📅 14/03/2026</span><span>📍 Grotta dei Cavalli</span><span>🌿 Plantaginaceae, famiglia di piccole e medie erbe cosmopolite caratterizzate da fiori ermafroditi a simmetria radiale, infiorescenze a spiga densa e frutti a capsula. Comprende piante generalmente umili con adattamento a substrati poveri e condizioni difficili.</span></div><div class=\"popup-btns\"><a href=\"https://drive.google.com/file/d/1q-Z3ahkqMCQ8t9qYfqRcmlPyxwnsdb_B/preview\" target=\"_blank\" class=\"btn-png\">📄 PNG</a><a href=\"https://drive.google.com/file/d/1HbgFHVlAGvJ5rXMZF2L2i-jdAZ1exi-4/preview\" target=\"_blank\" class=\"btn-pdf\">📑 PDF</a><a href=\"📍 Vedi su Maps\" target=\"_blank\" class=\"btn-maps\">📍 Maps</a></div></div>"},
  {"lat":38.188494,"lon":12.729744,"loc":"Grotta dei Cavalli","colore":"#C62828","popup":"<div class=\"popup-box\"><img src=\"https://drive.google.com/file/d/1jgEhrT1ie5HJlYSzmhJ0khJGnVfPgUBB/preview\" style=\"width:100%;max-width:260px;border-radius:6px;margin-bottom:8px\"><div class=\"popup-sci\">Linum bienne</div><div class=\"popup-com\">Lino biennale, Lino selvatico. In Italia noto localmente come lino di campo o lino silvestre, differenziato dal lino coltivato per l'habitus più minuto e il ciclo biologico biennale.</div><div class=\"popup-meta\"><span>📅 14/03/2026</span><span>📍 Grotta dei Cavalli</span><span>🌿 Linaceae, famiglia di piante erbacee e arbustive principalmente temperate. La famiglia comprende circa 250 specie distribuite globalmente, caratterizzate da fiori regolari e frutti a capsula con elevato valore economico per la produzione di fibre e semi oleosi.</span></div><div class=\"popup-btns\"><a href=\"https://drive.google.com/file/d/1zYJPYYDz5a7cugGlv9f_xQiqa_EhY6Bs/preview\" target=\"_blank\" class=\"btn-png\">📄 PNG</a><a href=\"https://drive.google.com/file/d/1AY4kNdbhLDyjqZrv1-YaV_BDkWb3YCeB/preview\" target=\"_blank\" class=\"btn-pdf\">📑 PDF</a><a href=\"📍 Vedi su Maps\" target=\"_blank\" class=\"btn-maps\">📍 Maps</a></div></div>"},
  {"lat":38.188492,"lon":12.729739,"loc":"Grotta dei Cavalli","colore":"#C62828","popup":"<div class=\"popup-box\"><img src=\"https://drive.google.com/file/d/1jHfEpZWRaQDznH2gIpKcbzF1oaccbk3F/preview\" style=\"width:100%;max-width:260px;border-radius:6px;margin-bottom:8px\"><div class=\"popup-sci\">Linum bienne</div><div class=\"popup-com\">Lino bienne, Lino selvatico biennale. In alcune regioni italiane è noto anche come Lino dei campi o Lino annuale, sebbene la forma biologica sia prevalentemente biennale o annuale prolungata.</div><div class=\"popup-meta\"><span>📅 14/03/2026</span><span>📍 Grotta dei Cavalli</span><span>🌿 Linaceae, famiglia di piante erbacee e arbusti diffusi in tutto il mondo, caratterizzati da foglie semplici alterne e fiori regolari. La famiglia comprende il genere Linum, dal quale si ricava il lino tessile di importanza economica mondiale.</span></div><div class=\"popup-btns\"><a href=\"https://drive.google.com/file/d/1Wxo334rkM_3JAZBdx4zNYMN18JZsvXRO/preview\" target=\"_blank\" class=\"btn-png\">📄 PNG</a><a href=\"https://drive.google.com/file/d/1FdlQlVTZ00CMS7WwCYP-7sseFLWfdUTd/preview\" target=\"_blank\" class=\"btn-pdf\">📑 PDF</a><a href=\"📍 Vedi su Maps\" target=\"_blank\" class=\"btn-maps\">📍 Maps</a></div></div>"},
  {"lat":38.188497,"lon":12.729736,"loc":"Grotta dei Cavalli","colore":"#C62828","popup":"<div class=\"popup-box\"><img src=\"https://drive.google.com/file/d/1WL9cx-x5f5bm_HVBPXKCTJZPLb3yZJ9J/preview\" style=\"width:100%;max-width:260px;border-radius:6px;margin-bottom:8px\"><div class=\"popup-sci\">Linum bienne</div><div class=\"popup-com\">Lino biennale, lino selvatico. In italiano meridionale talvolta detto semplicemente lino. Specie erbacea annuale o biennale, diffusa in ambienti ruderali e incolti del Mediterraneo.</div><div class=\"popup-meta\"><span>📅 14/03/2026</span><span>📍 Grotta dei Cavalli</span><span>🌿 Linaceae, famiglia delle piante con fiori pentameri, caratterizzate da fusti sottili e flessibili. Comprende circa 250 specie di piante erbacee e arbusti, molte con proprietà tessili o oleifere di interesse economico.</span></div><div class=\"popup-btns\"><a href=\"https://drive.google.com/file/d/1YL8MdVzxfhUYQ4icH8RROxd6jRdLYrTx/preview\" target=\"_blank\" class=\"btn-png\">📄 PNG</a><a href=\"https://drive.google.com/file/d/1tH-GbVWSv9MGZfruK1BSt6mb29Pue0AU/preview\" target=\"_blank\" class=\"btn-pdf\">📑 PDF</a><a href=\"📍 Vedi su Maps\" target=\"_blank\" class=\"btn-maps\">📍 Maps</a></div></div>"},
  {"lat":38.188231,"lon":12.728944,"loc":"Grotta dei Cavalli","colore":"#C62828","popup":"<div class=\"popup-box\"><img src=\"https://drive.google.com/file/d/1gCdEb2tIhz6b-_3Ok5-L1joLVricdZb7/preview\" style=\"width:100%;max-width:260px;border-radius:6px;margin-bottom:8px\"><div class=\"popup-sci\">Silybum marianum</div><div class=\"popup-com\">Cardo mariano, Cardo di Santa Maria, Cardo latteo. In Italia è conosciuto anche come cardo benedetto o cardo santo, soprattutto nelle regioni meridionali dove la tradizione popolare lo associa a proprietà miracolose.</div><div class=\"popup-meta\"><span>📅 14/03/2026</span><span>📍 Grotta dei Cavalli</span><span>🌿 Asteraceae (Compositae), famiglia delle piante erbacee e arbustive caratterizzate da fiori riuniti in capolini e frutto secco in achenio con pappo. Comprende oltre 23.000 specie diffuse in tutti i continenti, molte di interesse economico e medicinale.</span></div><div class=\"popup-btns\"><a href=\"https://drive.google.com/file/d/1Sv-Wv6eEgMIkPypqpfIowtKVcmqX_4F-/preview\" target=\"_blank\" class=\"btn-png\">📄 PNG</a><a href=\"https://drive.google.com/file/d/1PUUgTKNBHUhEe6Lq0psHtzmWIu22Ku8b/preview\" target=\"_blank\" class=\"btn-pdf\">📑 PDF</a><a href=\"📍 Vedi su Maps\" target=\"_blank\" class=\"btn-maps\">📍 Maps</a></div></div>"},

];

// ── Mappa ─────────────────────────────────────────────────────────────────────
const map = L.map('map').setView([38.2302, 13.1761], 9);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/">OpenStreetMap</a>',
  maxZoom: 19
}).addTo(map);

// ── Marker personalizzati ─────────────────────────────────────────────────────
function creaIcona(colore) {
  return L.divIcon({
    className: '',
    html: `<div style="
      width:14px;height:14px;border-radius:50%;
      background:${colore};border:2px solid white;
      box-shadow:0 1px 4px rgba(0,0,0,0.4)"></div>`,
    iconSize: [14, 14],
    iconAnchor: [7, 7],
    popupAnchor: [0, -10]
  });
}

// ── Cluster per localita ──────────────────────────────────────────────────────
const clusters = {};
const markerObjects = [];

MARKERS_DATA.forEach(d => {
  if (!clusters[d.loc]) {
    clusters[d.loc] = L.markerClusterGroup({
      maxClusterRadius: 40,
      iconCreateFunction: (cluster) => {
        const colore = d.colore;
        return L.divIcon({
          html: `<div style="
            background:${colore};color:white;border-radius:50%;
            width:32px;height:32px;display:flex;align-items:center;
            justify-content:center;font-weight:bold;font-size:12px;
            border:2px solid white;box-shadow:0 1px 4px rgba(0,0,0,0.4)">
            ${cluster.getChildCount()}</div>`,
          className: '',
          iconSize: [32, 32],
          iconAnchor: [16, 16]
        });
      }
    });
    clusters[d.loc].addTo(map);
  }

  const marker = L.marker([d.lat, d.lon], { icon: creaIcona(d.colore) });
  marker.bindPopup(d.popup, { maxWidth: 300, maxHeight: 400 });
  clusters[d.loc].addLayer(marker);
  markerObjects.push({ marker, loc: d.loc, cluster: clusters[d.loc] });
});

// ── Filtro per localita ───────────────────────────────────────────────────────
document.querySelectorAll('.loc-cb').forEach(cb => {
  cb.addEventListener('change', function() {
    const loc = this.dataset.loc;
    if (this.checked) {
      if (!map.hasLayer(clusters[loc])) map.addLayer(clusters[loc]);
    } else {
      if (map.hasLayer(clusters[loc]))  map.removeLayer(clusters[loc]);
    };
  });
});

function selezionaTutte(stato) {
  document.querySelectorAll('.loc-cb').forEach(cb => {
    cb.checked = stato;
    const loc = cb.dataset.loc;
    if (stato) {
      if (!map.hasLayer(clusters[loc])) map.addLayer(clusters[loc]);
    } else {
      if (map.hasLayer(clusters[loc]))  map.removeLayer(clusters[loc]);
    }
  });
}
</script>
