const map = L.map('map').setView([38.2453,13.3113], 8);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:19}).addTo(map);

function creaIcona(c){
  return L.divIcon({className:'',
    html:'<div style="width:14px;height:14px;border-radius:50%;background:'+c+';border:2px solid white;box-shadow:0 1px 4px rgba(0,0,0,0.4)"></div>',
    iconSize:[14,14],iconAnchor:[7,7],popupAnchor:[0,-10]});
}

const clusters = {};
MARKERS_DATA.forEach(d => {
  if (!clusters[d.loc]) {
    clusters[d.loc] = L.markerClusterGroup({
      maxClusterRadius: 40,
      iconCreateFunction: function(cl) {
        return L.divIcon({
          html: '<div style="background:'+d.colore+';color:white;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:12px;border:2px solid white;box-shadow:0 1px 4px rgba(0,0,0,0.4)">'+cl.getChildCount()+'</div>',
          className:'', iconSize:[32,32], iconAnchor:[16,16]
        });
      }
    });
    clusters[d.loc].addTo(map);
  }
  var marker = L.marker([d.lat, d.lon], {icon: creaIcona(d.colore)});
  marker.bindPopup(d.popup, {maxWidth:300});
  clusters[d.loc].addLayer(marker);
});

document.querySelectorAll('.loc-cb').forEach(function(cb) {
  cb.addEventListener('change', function() {
    var loc = this.dataset.loc;
    if (this.checked) { if (!map.hasLayer(clusters[loc])) map.addLayer(clusters[loc]); }
    else { if (map.hasLayer(clusters[loc])) map.removeLayer(clusters[loc]); }
  });
});

function selezionaTutte(s) {
  document.querySelectorAll('.loc-cb').forEach(function(cb) {
    cb.checked = s;
    var loc = cb.dataset.loc;
    if (s) { if (!map.hasLayer(clusters[loc])) map.addLayer(clusters[loc]); }
    else { if (map.hasLayer(clusters[loc])) map.removeLayer(clusters[loc]); }
  });
}
