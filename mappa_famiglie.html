<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Mappa famiglie botaniche — Ugo D'Accardi</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: 'Segoe UI', Arial, sans-serif;
  }
  #map {
    width: 100%;
    height: 100%;
  }
  #fam-panel {
    position: fixed;
    top: 10px;
    left: 10px;
    z-index: 9999;
    background: white;
    padding: 10px 12px;
    border: 2px solid #137139;
    border-radius: 8px;
    max-height: calc(100vh - 80px);
    overflow-y: auto;
    font-size: 12px;
    box-shadow: 0 4px 16px rgba(0,0,0,.25);
    min-width: 180px;
  }
  #fam-panel b {
    font-size: 13px;
    color: #137139;
  }
  #fam-panel hr {
    border: none;
    border-top: 1px solid #c8ddc4;
    margin: 6px 0;
  }
  .fam-row {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 2px 0;
    cursor: pointer;
    border-radius: 4px;
    padding: 2px 4px;
    transition: background .15s;
  }
  .fam-row:hover { background: #f0f7ee; }
  .fam-row label { cursor: pointer; user-select: none; }
  .btn-ctrl {
    font-size: 11px; padding: 3px 8px;
    border: 1px solid #137139; border-radius: 12px;
    background: white; color: #137139;
    cursor: pointer; font-weight: 600;
    transition: background .15s, color .15s;
  }
  .btn-ctrl:hover { background: #137139; color: white; }
  #fam-count {
    font-size: 10px;
    color: #888;
    margin-left: auto;
  }
  /* Pulsante torna all'album */
  #btn-album {
    position: fixed;
    bottom: 18px;
    right: 18px;
    z-index: 9999;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 18px;
    background: #b8860b;
    color: white;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: .04em;
    border-radius: 30px;
    text-decoration: none;
    box-shadow: 0 4px 16px rgba(0,0,0,.3);
    transition: background .2s, transform .15s;
  }
  #btn-album:hover { background: #9a6e09; transform: translateY(-2px); }
</style>
</head>

var famColors = {"Acanthaceae": "#1f77b4", "Agaricaceae": "#1f77b4", "Amaryllidaceae": "#1f77b4", "Anacardiaceae": "#aec7e8", "Apiaceae": "#aec7e8", "Apocynaceae": "#aec7e8", "Araceae": "#ff7f0e", "Arecaceae": "#ff7f0e", "Asparagaceae": "#ff7f0e", "Asphodelaceae": "#ffbb78", "Aspleniaceae": "#ffbb78", "Asteraceae": "#ffbb78", "Boraginaceae": "#2ca02c", "Brassicaceae": "#2ca02c", "Bryophyta": "#98df8a", "Cactaceae": "#98df8a", "Caprifoliaceae": "#98df8a", "Caryophyllaceae": "#d62728", "Cicadidae": "#d62728", "Commelinaceae": "#d62728", "Crassulaceae": "#ff9896", "Cupressaceae": "#ff9896", "Cyperaceae": "#ff9896", "Didiereaceae": "#9467bd", "Ericaceae": "#9467bd", "Euphorbiaceae": "#9467bd", "Fabaceae": "#c5b0d5", "Fagaceae": "#c5b0d5", "Fomitopsidaceae": "#8c564b", "Geraniaceae": "#8c564b", "Hypnaceae": "#8c564b", "Iridaceae": "#c49c94", "Lamiaceae": "#c49c94", "Linaceae": "#c49c94", "Loranthaceae": "#e377c2", "Malvaceae": "#e377c2", "Moraceae": "#e377c2", "Oleaceae": "#f7b6d2", "Orchidaceae": "#f7b6d2", "Oxalidaceae": "#f7b6d2", "Paeoniaceae": "#7f7f7f", "Papaveraceae": "#7f7f7f", "Pinaceae": "#c7c7c7", "Plantaginaceae": "#c7c7c7", "Poaceae": "#c7c7c7", "Polistirene": "#bcbd22", "Polygonaceae": "#bcbd22", "Primulaceae": "#bcbd22", "Ranunculaceae": "#dbdb8d", "Rhamnaceae": "#dbdb8d", "Rosaceae": "#dbdb8d", "Rubiaceae": "#17becf", "Schistostegaceae": "#17becf", "Solanaceae": "#17becf", "Tamaricaceae": "#9edae5", "Urticaceae": "#9edae5", "Violaceae": "#9edae5"};

// MAPPA
var map = L.map('map').setView([centerLat, centerLon], 8);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '&copy; <a href="https://openstreetmap.org/copyright">OpenStreetMap</a> contributors'
}).addTo(map);

// LAYER PER FAMIGLIA
var famLayers = {};
var activeCount = 0;

for (var fam in famData) {
    var layer = L.layerGroup();
    famData[fam].forEach(function(p) {
        L.circleMarker([p.lat, p.lon], {
            radius: 7,
            color: famColors[fam],
            fillColor: famColors[fam],
            fillOpacity: 0.85,
            weight: 1.5
        }).bindPopup(p.popup, {maxWidth: 220}).addTo(layer);
    });
    layer.addTo(map);
    famLayers[fam] = layer;
    activeCount++;
}

updateCount();

function updateCount() {
    var tot = Object.keys(famLayers).length;
    var act = Object.values(famLayers).filter(function(l) {
        return map.hasLayer(l);
    }).length;
    document.getElementById('fam-count').textContent = '(' + act + '/' + tot + ')';
}

// Click sulla riga intera (non solo checkbox)
function toggleFamClick(fam) {
    var cb = document.getElementById('cb_' + fam);
    cb.checked = !cb.checked;
    applyToggle(fam, cb.checked);
}

// Previeni doppio-toggle se click diretto sul checkbox
document.querySelectorAll('.fam-check').forEach(function(cb) {
    cb.addEventListener('click', function(e) {
        e.stopPropagation();
        var fam = this.id.replace('cb_', '');
        applyToggle(fam, this.checked);
    });
});

function applyToggle(fam, show) {
    if (show) {
        map.addLayer(famLayers[fam]);
    } else {
        map.removeLayer(famLayers[fam]);
    }
    updateCount();
}

function selectAll() {
    for (var fam in famLayers) {
        document.getElementById('cb_' + fam).checked = true;
        map.addLayer(famLayers[fam]);
    }
    updateCount();
}

function selectNone() {
    for (var fam in famLayers) {
        document.getElementById('cb_' + fam).checked = false;
        map.removeLayer(famLayers[fam]);
    }
    updateCount();
}
</script>
